# CAST web app — deploy target: Docker on trt-cast-01
# (knowledge/architecture/cast-web-app-vm-provisioning.md + cast-web-app-deployment.md).
# Deploy from the repo root:  docker compose up -d --build
services:
  api:
    build:
      context: .
      dockerfile: components/api/Dockerfile
    image: cast-api:latest
    container_name: cast-api
    restart: unless-stopped
    env_file: components/api/.env
    volumes:
      # Encrypted store + key on a host bind mount so backups read it directly
      # (scripts/backup.sh). Persists across redeploys.
      - /opt/cast/data:/app/components/api/.data
    networks: [internal]
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3001/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build:
      context: .
      dockerfile: components/web/Dockerfile
    image: cast-web:latest
    container_name: cast-web
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      # Certs from the host (acme-dns DNS-01 / self-signed interim), read-only.
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      api:
        condition: service_healthy
    networks: [internal]

networks:
  internal:
    driver: bridge
