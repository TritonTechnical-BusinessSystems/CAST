# CAST web nginx — serves the SPA, proxies /api, terminates TLS.
# Certs are bind-mounted read-only from the host /etc/letsencrypt (acme-dns
# DNS-01, mirroring Logistics Coordinator; self-signed interim). See
# knowledge/architecture/cast-web-app-deployment.md.

# Runtime DNS for the api service name so nginx starts even if api is briefly down.
resolver 127.0.0.11 valid=10s;

server {
  listen 80;
  server_name cast.tritontechnical.com;
  return 301 https://$host$request_uri;
}

server {
  listen 443 ssl;
  server_name cast.tritontechnical.com;
  root /usr/share/nginx/html;
  index index.html;

  ssl_certificate     /etc/letsencrypt/live/cast.tritontechnical.com/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/cast.tritontechnical.com/privkey.pem;
  ssl_protocols       TLSv1.2 TLSv1.3;
  ssl_ciphers         HIGH:!aNULL:!MD5;

  location /api/ {
    set $api http://api:3001;
    proxy_pass $api;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 60s;
  }

  # index.html must never cache so new asset fingerprints are picked up post-deploy.
  location = /index.html { add_header Cache-Control "no-store, no-cache, must-revalidate"; }
  location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ { expires 1y; add_header Cache-Control "public, immutable"; }
  location / { try_files $uri $uri/ /index.html; }
}
